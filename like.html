    <h1>🗳️ Votar por Atom-Craft</h1>

<!-- ========== Leaderboard AtomCraft ========== -->
<section id="vote-leaderboard" class="ac-leaderboard">
  <div class="ac-header">
    <h2 id="titulo-mes">🏆 Cargando...</h2>
    <div class="ac-controls">
      <input id="ac-search" type="search" placeholder="Buscar jugador..." />
    </div>
  </div>

  <ol id="ac-list" class="ac-list" start="1" aria-live="polite"></ol>

  <div class="ac-footer">
    <button id="ac-prev" disabled>← Mes Anterior</button>
    <span id="ac-page">1 / 1</span>
    <button id="ac-next" disabled>Mes Siguiente →</button>
  </div>
</section>

<style>
  :root{
    --ac-bg: rgba(18,18,28,.75);
    --ac-card: rgba(255,255,255,.06);
    --ac-border: rgba(255,255,255,.08);
    --ac-text: #e9ecf1;
    --ac-sub: #b9c1cc;
    --ac-accent: #5df2b0;
    --ac-accent-2: #4ec4ff;
  }
  @media (prefers-color-scheme: light){
    :root{
      --ac-bg: rgba(255,255,255,.75);
      --ac-card: rgba(0,0,0,.04);
      --ac-border: rgba(0,0,0,.06);
      --ac-text: #111827;
      --ac-sub: #4b5563;
    }
  }
  .ac-leaderboard{
    backdrop-filter: blur(6px);
    background: var(--ac-bg);
    border: 1px solid var(--ac-border);
    border-radius: 14px;
    padding: 18px;
    margin: 28px auto;
    max-width: 860px;
    box-shadow: 0 8px 30px rgba(0,0,0,.25);
  }
  .ac-header{
    display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap;
    margin-bottom:12px; color:var(--ac-text)
  }
  .ac-header h2{
    margin:0; font-weight:800; letter-spacing:.3px;
    background: linear-gradient(90deg,var(--ac-accent),var(--ac-accent-2));
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .ac-controls{display:flex; gap:8px}
  .ac-controls input{
    background: var(--ac-card); color: var(--ac-text);
    border:1px solid var(--ac-border); border-radius:10px;
    padding:10px 12px; outline:none;
  }
  .ac-list{list-style:none; padding:0; margin:0; display:grid; gap:10px}
  .ac-item{
    display:grid; grid-template-columns: 48px 1fr auto; align-items:center; gap:14px;
    background: linear-gradient(180deg, var(--ac-card), transparent);
    border:1px solid var(--ac-border); border-radius:12px; padding:10px;
    transition: transform .15s ease, border-color .15s ease;
  }
  .ac-item:hover{ transform: translateY(-2px); border-color: var(--ac-accent-2)}
  .ac-rank{ font-weight:800; width:48px; text-align:center; color:var(--ac-sub)}
  .ac-main{ display:flex; align-items:center; gap:12px; min-width:0}
  .ac-main img{ width:42px; height:42px; border-radius:8px; image-rendering: pixelated; }
  .ac-name{
    color:var(--ac-text); font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .ac-sub{ color:var(--ac-sub); font-size:.9rem}
  .ac-right{ display:flex; align-items:center; gap:14px}
  .ac-points{ text-align:right; width: 40px;}
  .ac-points b{ color:var(--ac-text)}
  .ac-bar-wrap{ width:180px; height:8px; background:var(--ac-card); border-radius:6px; overflow:hidden; border:1px solid var(--ac-border)}
  .ac-bar{ height:100%; width:0; background: linear-gradient(90deg, var(--ac-accent), var(--ac-accent-2)); transition: width .9s cubic-bezier(.2,.7,.2,1)}
  .ac-footer{ display:flex; justify-content:center; align-items:center; gap:12px; margin-top:12px}
  .ac-footer button{
    padding:8px 12px; border-radius:10px; border:1px solid var(--ac-border);
    background:var(--ac-card); color:var(--ac-text); cursor:pointer
  }
  .ac-footer button:disabled { opacity: 0.5; cursor: not-allowed; }
  .ac-medal{ font-size:1.1rem; margin-right:6px }

  /* Alineación perfecta de nombre + subtítulo */
  .ac-main {
    display: grid;
    grid-template-columns: 42px 1fr;
    align-items: center;
    gap: 12px;
  }
  .ac-main img { grid-column: 1; }
  .ac-main > div {
    grid-column: 2;
    display: flex;
    flex-direction: column;
    justify-content: center;
    height: 42px;
    min-width: 0;
  }
  .ac-name {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    line-height: 1.2;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .ac-sub { line-height: 1; white-space: nowrap; }
</style>

<script>
(async function(){
  const listEl   = document.getElementById('ac-list');
  const searchEl = document.getElementById('ac-search');
  const prevEl   = document.getElementById('ac-prev');
  const nextEl   = document.getElementById('ac-next');
  const pageEl   = document.getElementById('ac-page');
  const tituloEl = document.getElementById('titulo-mes');

  let historial = [];
  let currentIndex = 0; // 0 = El mes más reciente en el JSON
  let searchQuery = '';

  // 1) Carga de datos del nuevo JSON
  try{
    const res = await fetch('data/votes.json', {cache: 'no-store'});
    const data = await res.json();
    historial = data.historial || [];
  }catch(e){
    console.error(e);
    historial = [];
  }

  function medal(rank){
    if(rank===1) return '🥇';
    if(rank===2) return '🥈';
    if(rank===3) return '🥉';
    return '';
  }

  // 2) Función para dibujar el mes en pantalla
  function render(){
    if(historial.length === 0) {
      tituloEl.textContent = "Sin datos de votos";
      return;
    }

    const mesData = historial[currentIndex];
    
    // Actualizar título y contador de páginas
    tituloEl.textContent = `🏆 Ranking - ${mesData.mes}`;
    pageEl.textContent = `${currentIndex + 1} / ${historial.length}`;

    // Filtrar por el buscador
    let filtrados = mesData.players.filter(p => p.name.toLowerCase().includes(searchQuery));
    
    // Ordenar de mayor a menor por si acaso
    filtrados.sort((a, b) => b.votos - a.votos);

    // Calcular el máximo de votos para el 100% de la barra
    const maxVotos = filtrados.length > 0 ? Math.max(...filtrados.map(p => p.votos)) : 1;

    listEl.innerHTML = '';
    
    filtrados.forEach((p, i) => {
      const rank = i + 1;
      const li = document.createElement('li');
      li.className = 'ac-item';
      const avatar = `https://minotar.net/avatar/${encodeURIComponent(p.name)}/64`;

      // Calcular el ancho de la barra
      const porcentajeBarra = Math.round((p.votos / maxVotos) * 100);

      li.innerHTML = `
        <div class="ac-rank">${medal(rank)}<span>${rank}</span></div>
        <div class="ac-main">
          <img src="${avatar}" alt="${p.name} avatar" loading="lazy" />
          <div>
            <div class="ac-name">${p.name}</div>
            <div class="ac-sub">Total votos</div>
          </div>
        </div>
        <div class="ac-right">
          <div class="ac-bar-wrap">
            <div class="ac-bar" style="width:${porcentajeBarra}%"></div>
          </div>
          <div class="ac-points">
            <b>${p.votos}</b>
          </div>
        </div>
      `;
      listEl.appendChild(li);
    });

    // Animar las barras
    requestAnimationFrame(()=>document.querySelectorAll('.ac-bar').forEach(b=>b.style.width=b.style.width));

    // Control de botones (Anterior = Ir al pasado [aumentar índice])
    prevEl.disabled = (currentIndex >= historial.length - 1);
    // Control de botones (Siguiente = Volver al presente [disminuir índice])
    nextEl.disabled = (currentIndex <= 0);
  }

  // 3) Eventos
  searchEl.addEventListener('input', e => { 
    searchQuery = e.target.value.trim().toLowerCase(); 
    render(); 
  });
  
  prevEl.addEventListener('click', () => { 
    if(currentIndex < historial.length - 1) { currentIndex++; render(); } 
  });
  
  nextEl.addEventListener('click', () => { 
    if(currentIndex > 0) { currentIndex--; render(); } 
  });

  // Inicializar la tabla
  render();
})();
</script>
<!-- ========== /Leaderboard AtomCraft ========== -->
